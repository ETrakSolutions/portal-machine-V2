    <!-- HERO ACCENT BAR -->
    <div class="accent-bar"></div>

    <main>
        <!-- SELECTOR PANEL -->
        <section class="selector-section">
            <div class="section-label">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <h1>Recherche de machine</h1>
            </div>
            <p class="intro-text">Selectionnez les criteres pour afficher les details techniques.</p>

            <div class="selectors-grid">
                <div class="selector-group">
                    <label for="select-type">
                        <span class="label-num">01</span> Type de machine
                    </label>
                    <select id="select-type">
                        <option value="">-- Selectionnez --</option>
                    </select>
                </div>

                <div class="selector-group">
                    <label for="select-fabricant">
                        <span class="label-num">02</span> Fabricant
                    </label>
                    <select id="select-fabricant" disabled>
                        <option value="">-- Selectionnez --</option>
                    </select>
                </div>

                <div class="selector-group">
                    <label for="select-annee">
                        <span class="label-num">03</span> Annee
                    </label>
                    <select id="select-annee" disabled>
                        <option value="">-- Selectionnez --</option>
                    </select>
                </div>

                <div class="selector-group">
                    <label for="select-modele">
                        <span class="label-num">04</span> Modele
                    </label>
                    <select id="select-modele" disabled>
                        <option value="">-- Selectionnez --</option>
                    </select>
                </div>
            </div>

            <button id="btn-reset" class="btn-reset" style="display:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reinitialiser
            </button>
        </section>

        <!-- RESULTS -->
        <section id="results-section" class="results-section" style="display:none;">
            <div class="results-header">
                <div class="results-title-wrap">
                    <span id="results-badge" class="badge"></span>
                    <h2 id="results-title"></h2>
                </div>
                <div class="results-accent"></div>
            </div>
            <div id="results-table-container"></div>
        </section>

        <!-- EMPTY STATE -->
        <section id="empty-state" class="empty-state">
            <div class="empty-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                    <polyline points="16 3 12 7 8 3"/>
                </svg>
            </div>
            <p class="empty-title">Aucune machine selectionnee</p>
            <p class="empty-subtitle">Utilisez les filtres ci-dessus pour consulter les specifications techniques.</p>
        </section>
