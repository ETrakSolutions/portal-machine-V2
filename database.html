<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Trak | Base de donnees</title>
    <link rel="stylesheet" href="css/style.css?v=139">
    <link rel="stylesheet" href="css/admin.css?v=139">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* Full width on desktop */
        .selector-section {
            max-width: 100% !important;
            padding: 1rem 1.5rem !important;
        }
        .db-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            align-items: flex-end;
        }
        .db-control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .db-control-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
        }
        .db-control-group select,
        .db-control-group input {
            padding: 8px 12px;
            background: var(--bg-input, #1a2332);
            border: 1px solid var(--border, #2a3a4a);
            border-radius: 6px;
            color: #fff;
            font-size: 0.85rem;
            min-width: 160px;
        }
        .db-search {
            min-width: 250px !important;
        }
        .db-stats {
            color: #999;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .db-stats strong {
            color: #00CC66;
        }
        .db-scroll-top {
            overflow-x: auto;
            border: 1px solid var(--border, #2a3a4a);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }
        .db-scroll-top-inner {
            height: 1px;
        }
        .db-table-wrap {
            overflow-x: auto;
            border-radius: 0 0 8px 8px;
            border: 1px solid var(--border, #2a3a4a);
            border-top: none;
        }
        .db-table thead th:last-child,
        .db-table tbody td:last-child {
            padding-right: 30px;
        }
        .db-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .db-table thead th {
            background: #1a2a3a;
            color: #fff;
            padding: 10px 12px;
            text-align: left;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .db-table thead th:hover {
            background: #243a4f;
        }
        .db-table thead th .sort-arrow {
            margin-left: 4px;
            opacity: 0.3;
        }
        .db-table thead th.sorted .sort-arrow {
            opacity: 1;
            color: #00CC66;
        }
        .db-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .db-table tbody tr:hover {
            background: rgba(0,100,200,0.1);
        }
        .db-table tbody td {
            padding: 8px 12px;
            color: #ccc;
            white-space: nowrap;
        }
        .db-table tbody td:first-child {
            font-weight: 600;
            color: #fff;
        }
        /* Freeze first 2 columns */
        .db-table thead th:nth-child(1),
        .db-table tbody td:nth-child(1) {
            position: sticky;
            left: 0;
            z-index: 5;
            background: #1a2a3a;
        }
        .db-table thead th:nth-child(2),
        .db-table tbody td:nth-child(2) {
            position: sticky;
            left: 100px;
            z-index: 5;
            background: #1a2a3a;
        }
        .db-table thead th:nth-child(1),
        .db-table thead th:nth-child(2) {
            z-index: 15;
        }
        .db-table tbody tr:hover td:nth-child(1),
        .db-table tbody tr:hover td:nth-child(2) {
            background: #1e3450;
        }
        /* When fab column is hidden, modele becomes the first sticky column */
        .db-table.fab-hidden thead th:nth-child(2),
        .db-table.fab-hidden tbody td:nth-child(2) {
            left: 0;
        }
        .db-table .incomplete {
            color: #FF8C00;
            font-style: italic;
        }
        .db-pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .db-pagination button {
            padding: 6px 14px;
            background: var(--bg-input, #1a2332);
            border: 1px solid var(--border, #2a3a4a);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .db-pagination button:hover { border-color: #0062CC; }
        .db-pagination button:disabled { opacity: 0.3; cursor: default; }
        .db-pagination .page-info { color: #999; font-size: 0.8rem; }
        .db-export-btn {
            padding: 8px 16px;
            background: #0062CC;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .db-export-btn:hover { background: #004A99; }
        /* BOM tokens */
        .bom-token {
            display: inline-block;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            text-align: center;
            line-height: 22px;
            font-size: 0.65rem;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s;
        }
        .bom-token:hover { transform: scale(1.3); }
        .bom-token.readonly { cursor: default; opacity: 0.7; }
        .bom-token.readonly:hover { transform: none; }
        .bom-r { background: #CC0000; color: #fff; }
        .bom-j { background: #CCAA00; color: #000; }
        .bom-na { background: #444; color: #888; font-size: 0.55rem; }
        .db-table thead th.bom-col {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 8px 4px;
            font-size: 0.55rem;
            min-width: 30px;
            max-width: 34px;
            text-align: center;
            cursor: default;
        }
        .db-table thead th.bom-col:hover { background: #1a2a3a; }
        .db-legend {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.75rem;
            color: #999;
        }
        .db-legend-item { display: flex; align-items: center; gap: 4px; }
        .db-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00CC66;
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 9999;
            animation: toastFade 2s forwards;
        }
        @keyframes toastFade { 0%,70%{opacity:1} 100%{opacity:0} }
        .db-delete-btn {
            background: none;
            border: none;
            color: #FF4444;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0.4;
        }
        .db-delete-btn:hover { opacity: 1; background: rgba(255,68,68,0.15); }
        .db-harnais-select {
            background: #1a2332;
            border: 1px solid #2a3a4a;
            border-radius: 4px;
            color: #00CC66;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 4px;
            cursor: pointer;
            max-width: 110px;
        }
        .db-harnais-select:focus { border-color: #0062CC; outline: none; }
        .db-note-input {
            background: var(--bg-input, #1a2332);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #ccc;
            font-size: 0.65rem;
            padding: 3px 6px;
            width: 120px;
            min-width: 80px;
        }
        .db-note-input:focus { border-color: #0062CC; outline: none; color: #fff; }
        .db-note-input.note-saved { border-color: #00CC66; }
        /* Product codes */
        .db-pc-cell { position: relative; min-width: 120px; }
        .db-pc-tags { display: flex; flex-wrap: wrap; gap: 2px; cursor: pointer; min-height: 22px; }
        .db-pc-tag {
            display: inline-flex; align-items: center; gap: 2px;
            background: rgba(0,98,204,0.2); color: #6CB4FF; border-radius: 3px;
            font-size: 0.6rem; font-weight: 600; padding: 1px 5px; white-space: nowrap;
        }
        .db-pc-tag .pc-rm { cursor: pointer; color: #FF4444; font-weight: 800; margin-left: 2px; }
        .db-pc-tag .pc-rm:hover { color: #FF8888; }
        .db-pc-empty { color: #555; font-size: 0.6rem; cursor: pointer; }
        .db-pc-popup {
            position: fixed; z-index: 9999; background: #1a2332; border: 1px solid #0062CC;
            border-radius: 8px; padding: 12px; min-width: 300px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .db-pc-popup h4 { margin: 0 0 8px; color: #fff; font-size: 0.8rem; }
        .db-pc-popup .pc-row { display: flex; gap: 4px; margin-bottom: 6px; }
        .db-pc-popup input { background: #0d1520; border: 1px solid #2a3a4a; border-radius: 4px; color: #fff; padding: 4px 8px; font-size: 0.75rem; }
        .db-pc-popup input.pc-code { width: 90px; }
        .db-pc-popup input.pc-desc { flex: 1; min-width: 100px; }
        .db-pc-popup input.pc-qty { width: 40px; text-align: center; }
        .db-pc-popup .pc-add-btn {
            background: #00CC66; color: #000; border: none; border-radius: 4px;
            padding: 4px 10px; font-weight: 700; font-size: 0.75rem; cursor: pointer;
        }
        .db-pc-popup .pc-add-btn:hover { background: #00AA55; }
        .db-pc-popup .pc-close {
            position: absolute; top: 6px; right: 10px; background: none; border: none;
            color: #999; font-size: 1rem; cursor: pointer;
        }
        .db-pc-popup .pc-list { max-height: 150px; overflow-y: auto; margin-bottom: 8px; }
        .db-pc-popup .pc-list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.7rem; color: #ccc;
        }
        .db-pc-popup .pc-list-item .pc-del { color: #FF4444; cursor: pointer; padding: 0 4px; }
        .pc-allyears-label {
            display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
            font-size: 0.7rem; color: #FF8C00; cursor: pointer; user-select: none;
        }
        .pc-allyears-label input { accent-color: #FF8C00; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="header-back" title="Retour au Portail e-Trak">&larr; Portail</a>
            <div class="logo-section">
                <img src="assets/logo-white.png" alt="e-Trak | GRYB" class="header-logo">
            </div>
        </div>
    </header>

    <main>
        <section class="selector-section">
            <div class="intro-row">
                <span class="section-title">Base de donnees Machine</span>
            </div>

            <div class="db-controls">
                <div class="db-control-group">
                    <label>Type</label>
                    <select id="db-type"></select>
                </div>
                <div class="db-control-group">
                    <label>Fabricant</label>
                    <select id="db-fab">
                        <option value="">Tous</option>
                    </select>
                </div>
                <div class="db-control-group">
                    <label>Annee</label>
                    <select id="db-annee">
                        <option value="">Toutes</option>
                    </select>
                </div>
                <div class="db-control-group">
                    <label>Recherche</label>
                    <input type="text" id="db-search" class="db-search" placeholder="Rechercher un modele...">
                </div>
                <div class="db-control-group">
                    <label>&nbsp;</label>
                    <button id="db-export" class="db-export-btn">&#128196; Exporter CSV</button>
                </div>
            </div>

            <div class="db-legend">
                <span class="db-legend-item"><span class="bom-token bom-r">R</span> Obligatoire</span>
                <span class="db-legend-item"><span class="bom-token bom-j">J</span> Optionnel</span>
                <span class="db-legend-item"><span class="bom-token bom-na">-</span> N/A</span>
                <span style="color:#555;">| Cliquer pour modifier (admin)</span>
            </div>
            <div id="db-stats" class="db-stats"></div>

            <div class="db-scroll-top" id="db-scroll-top"><div class="db-scroll-top-inner" id="db-scroll-top-inner"></div></div>
            <div class="db-table-wrap" id="db-table-wrap" style="max-height: 65vh; overflow-y: auto;">
                <table class="db-table" id="db-table">
                    <thead>
                        <tr>
                            <th data-col="fab">Fabricant <span class="sort-arrow">&#9650;</span></th>
                            <th data-col="modele">Modele <span class="sort-arrow">&#9650;</span></th>
                            <!-- BOM + Spec columns generated dynamically by loadType() -->
                            <th style="width:30px;min-width:30px;text-align:center;font-size:0.6rem;">DEL</th>
                        </tr>
                    </thead>
                    <tbody id="db-tbody"></tbody>
                </table>
            </div>

            <div class="db-pagination">
                <button id="db-prev" disabled>&larr; Precedent</button>
                <span id="db-page-info" class="page-info"></span>
                <button id="db-next">Suivant &rarr;</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-brand">
                <img src="assets/logo-white.png" alt="e-Trak | GRYB" class="footer-logo">
            </div>
            <p class="footer-copy">&copy; 2026 Portail e-Trak &mdash; Usage interne</p>
        </div>
    </footer>

    <script>
    (function() {
        var API_URL = 'https://script.google.com/macros/s/AKfycbxDuq4Qt2mrsLGiOGLrxSFvouttOfjDYzky27tjcKL72QSc__cR4qvu1X2qyDFCuB8V/exec';
        var PAGE_SIZE = 50;
        var currentPage = 0;
        var allData = [];
        var filtered = [];
        var sortCol = 'classe';
        var sortAsc = true;
        var overridesCache = {};
        var productCodesCache = {};

        function pcKey(fab, modele, annee) {
            return 'product_codes_' + fab.replace(/[^a-zA-Z0-9]/g,'_') + '_' + modele.replace(/[^a-zA-Z0-9]/g,'_') + '_' + annee;
        }

        function loadProductCodes(fab, modele, annee, callback) {
            var key = pcKey(fab, modele, annee);
            if (productCodesCache[key] !== undefined) { callback(productCodesCache[key]); return; }
            fetch(API_URL + '?action=get&key=' + encodeURIComponent(key))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var val = [];
                    if (data.value) { try { val = JSON.parse(data.value); } catch(e) {} }
                    productCodesCache[key] = val;
                    callback(val);
                })
                .catch(function() { callback([]); });
        }

        function saveProductCodes(fab, modele, annee, codes) {
            var key = pcKey(fab, modele, annee);
            productCodesCache[key] = codes;
            fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'text/plain'},
                body: JSON.stringify({ action: 'save', key: key, value: JSON.stringify(codes), pin: '1400' })
            }).then(function() { showToast('Codes produit sauvegardes'); }).catch(function() {});
        }

        function saveProductCodesAllYears(fab, modele, codes) {
            // Find all years for this fab+modele
            var years = [];
            allData.forEach(function(d) {
                if (d.fab === fab && d.modele === modele && years.indexOf(d.annee) === -1) {
                    years.push(d.annee);
                }
            });
            var codeCopy = JSON.stringify(codes);
            // Update cache + visible cells immediately
            years.forEach(function(y) {
                productCodesCache[pcKey(fab, modele, y)] = JSON.parse(codeCopy);
            });
            document.querySelectorAll('.db-pc-tags').forEach(function(tags) {
                if (tags.dataset.fab === fab && tags.dataset.modele === modele) {
                    var cell = tags.closest('.db-pc-cell');
                    renderCellTags(cell, JSON.parse(codeCopy));
                }
            });
            // Save to API sequentially (Google Apps Script drops simultaneous calls)
            var saved = 0;
            function saveNext() {
                if (saved >= years.length) {
                    showToast('Codes produit sauvegardes pour ' + years.length + ' annees');
                    return;
                }
                var y = years[saved];
                var key = pcKey(fab, modele, y);
                fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'text/plain'},
                    body: JSON.stringify({ action: 'save', key: key, value: codeCopy, pin: '1400' })
                }).then(function() {
                    saved++;
                    saveNext();
                }).catch(function() {
                    saved++;
                    saveNext();
                });
            }
            saveNext();
        }

        var activePopup = null;
        function closePopup() {
            if (activePopup) { activePopup.remove(); activePopup = null; }
        }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePopup(); });

        function openProductCodesPopup(fab, modele, annee, cell) {
            closePopup();
            var key = pcKey(fab, modele, annee);
            var codes = productCodesCache[key] || [];

            var popup = document.createElement('div');
            popup.className = 'db-pc-popup';
            // Count how many years exist for this fab+modele
            var yearCount = 0;
            var seenYears = {};
            allData.forEach(function(d) {
                if (d.fab === fab && d.modele === modele && !seenYears[d.annee]) {
                    seenYears[d.annee] = true;
                    yearCount++;
                }
            });

            popup.innerHTML =
                '<button class="pc-close">&times;</button>' +
                '<h4>Codes produit — ' + fab + ' ' + modele + ' (' + annee + ')</h4>' +
                (yearCount > 1 ? '<label class="pc-allyears-label"><input type="checkbox" id="pc-allyears"> Appliquer a toutes les annees (' + yearCount + ' annees)</label>' : '') +
                '<div class="pc-list" id="pc-list-active"></div>' +
                '<div class="pc-row">' +
                    '<input class="pc-code" id="pc-new-code" placeholder="Code" maxlength="20">' +
                    '<input class="pc-desc" id="pc-new-desc" placeholder="Description">' +
                    '<input class="pc-qty" id="pc-new-qty" type="number" min="1" value="1" placeholder="Qte">' +
                    '<button class="pc-add-btn" id="pc-add-btn">+</button>' +
                '</div>';

            document.body.appendChild(popup);
            activePopup = popup;

            // Position near cell
            var rect = cell.getBoundingClientRect();
            popup.style.top = Math.min(rect.bottom + 4, window.innerHeight - popup.offsetHeight - 10) + 'px';
            popup.style.left = Math.min(rect.left, window.innerWidth - popup.offsetWidth - 10) + 'px';

            function renderList() {
                var list = popup.querySelector('#pc-list-active');
                if (!codes.length) {
                    list.innerHTML = '<div style="color:#555;font-size:0.65rem;padding:4px;">Aucun code produit</div>';
                    return;
                }
                list.innerHTML = codes.map(function(c, i) {
                    return '<div class="pc-list-item"><span>' + c.code + ' — ' + c.desc + ' (x' + c.qty + ')</span><span class="pc-del" data-i="' + i + '">&times;</span></div>';
                }).join('');
            }
            renderList();

            function isAllYears() {
                var cb = popup.querySelector('#pc-allyears');
                return cb && cb.checked;
            }

            function saveCodes() {
                if (isAllYears()) {
                    saveProductCodesAllYears(fab, modele, codes);
                } else {
                    saveProductCodes(fab, modele, annee, codes);
                    renderCellTags(cell, codes);
                }
            }

            // Delete
            popup.addEventListener('click', function(e) {
                var del = e.target.closest('.pc-del');
                if (del) {
                    codes.splice(parseInt(del.dataset.i), 1);
                    saveCodes();
                    renderList();
                }
                if (e.target.closest('.pc-close')) closePopup();
            });

            // Add
            popup.querySelector('#pc-add-btn').addEventListener('click', function() {
                var codeVal = popup.querySelector('#pc-new-code').value.trim();
                var descVal = popup.querySelector('#pc-new-desc').value.trim();
                var qtyVal = parseInt(popup.querySelector('#pc-new-qty').value) || 1;
                if (!codeVal) { popup.querySelector('#pc-new-code').focus(); return; }
                codes.push({ code: codeVal, desc: descVal, qty: qtyVal });
                saveCodes();
                renderList();
                popup.querySelector('#pc-new-code').value = '';
                popup.querySelector('#pc-new-desc').value = '';
                popup.querySelector('#pc-new-qty').value = '1';
                popup.querySelector('#pc-new-code').focus();
            });

            popup.querySelector('#pc-new-code').focus();
        }

        function renderCellTags(cell, codes) {
            var tags = cell.querySelector('.db-pc-tags');
            if (!codes.length) {
                tags.innerHTML = '<span class="db-pc-empty">+ Ajouter</span>';
            } else {
                tags.innerHTML = codes.map(function(c) {
                    return '<span class="db-pc-tag">' + c.code + (c.qty > 1 ? ' x' + c.qty : '') + '</span>';
                }).join('');
            }
        }

        var EXC_BOM_CODES = ['0000','0001','0002','0004','0005','0008','0009','0070'];
        var POMPE_BOM_CODES = ['0200','0203','0201','0202','0204','0205','0206','0207','0208','0209'];
        var BOM_CODES = EXC_BOM_CODES; // default, updated on type change
        var BOM_NAMES = {
            '0000': 'Cabine', '0001': 'Hauteur', '0002': 'Rotation', '0004': 'Mini exc',
            '0005': 'Multi Axes', '0008': 'Swing boom', '0009': 'Drain hyd', '0070': 'Boite GC',
            '0200': 'Avec coffre', '0203': 'Sans coffre', '0201': 'Hauteur', '0202': 'Rotation',
            '0204': '4 sections', '0205': '5 sections', '0206': '6 sections',
            '0207': 'Rot. cylindre', '0208': 'Inclinometre', '0209': 'Reel 15M',
            'H0031': 'Harnais Hitachi-5/6 JD', 'H0032': 'Harnais Komatsu', 'H0033': 'Harnais Doosan',
            'H0034': 'Harnais Volvo', 'H0041': 'Harnais Link-Belt/Case', 'H0080': 'Harnais Cat',
            'H0100': 'Harnais Cat (ECU)', 'H0121': 'Harnais Hitachi-7', 'H0043': 'Harnais Generique'
        };

        // Spec columns per machine type: {key: label}
        var SPEC_COLS = {
            'Excavatrice': [
                {key: 'puissance', label: 'Puissance (kW/HP)'},
                {key: 'traction', label: 'Traction'},
                {key: 'boom', label: 'Type boom'},
                {key: 'swing', label: 'Swing'},
                {key: 'voltage', label: 'Voltage'},
                {key: 'poids', label: 'Poids (kg/lbs)'},
                {key: 'classe', label: 'Classe'}
            ],
            'Pompe a Beton': [
                {key: 'type_pompe', label: 'Type'},
                {key: 'nb_sections', label: 'Nb sections'},
                {key: 'pliage', label: 'Pliage'},
                {key: 'voltage', label: 'Voltage'},
                {key: 'rotation', label: 'Rotation'},
                {key: 'console', label: 'Console'},
                {key: 'estop', label: 'E-stop'},
                {key: 'notes', label: 'Notes'}
            ]
        };
        var currentSpecCols = SPEC_COLS['Excavatrice'];

        // Auth
        var DB_ROLES = { super_admin: true, administrateur: true, ingenierie: true };
        var EDIT_ROLES = { super_admin: true, administrateur: true };
        var user = null;
        try { user = JSON.parse(localStorage.getItem('portal_user')); } catch(e) {}
        var hasAccess = user && user.role && DB_ROLES[user.role];
        var canEdit = user && user.role && EDIT_ROLES[user.role];
        if (!hasAccess) {
            document.querySelector('main').innerHTML = '<section class="selector-section"><p style="color:#FF4444;text-align:center;padding:2rem;">Acces non autorise. Connectez-vous avec un compte administrateur ou ingenierie.</p></section>';
        }

        function showToast(msg) {
            var t = document.createElement('div');
            t.className = 'db-toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(function() { t.remove(); }, 2200);
        }

        function bomKey(fab, modele, annee) {
            return 'kit_override_' + fab.replace(/[^a-zA-Z0-9]/g,'_') + '_' + modele.replace(/[^a-zA-Z0-9]/g,'_') + '_' + annee;
        }

        function loadOverride(fab, modele, annee, callback) {
            var key = bomKey(fab, modele, annee);
            if (overridesCache[key] !== undefined) { callback(overridesCache[key]); return; }
            fetch(API_URL + '?action=get&key=' + encodeURIComponent(key))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var val = null;
                    if (data.value) { try { val = JSON.parse(data.value); } catch(e) {} }
                    overridesCache[key] = val;
                    callback(val);
                })
                .catch(function() { callback(null); });
        }

        function saveOverride(fab, modele, annee, overrides) {
            var key = bomKey(fab, modele, annee);
            overridesCache[key] = overrides;
            fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'text/plain'},
                body: JSON.stringify({ action: 'save', key: key, value: JSON.stringify(overrides), pin: '1400' })
            }).then(function() { showToast('BOM sauvegarde'); }).catch(function() {});
        }

        // R7 — Machines specifiques drain obligatoire (1500-0009)
        // R7 — Drain obligatoire: prefixes de modeles (match si le modele COMMENCE par le prefixe)
        var DRAIN_PREFIXES = [
            // Case
            'CX80','CX145','CX170','CX210','CX220','CX245','CX300','CX350','CX380','CX490','145 D',
            // Caterpillar
            '308','315','316','320','336','440','450','M318',
            // Doosan/Develon
            'DX190','DX235','BX190',
            // Hitachi
            'ZX210LC','EX200','ZX130-6','ZX190','ZX350','ZX490','ZX50U','ZX75US','ZX245',
            // JCB
            '245X',
            // John Deere
            '135','200CLC','210G','210P','210 P','245 P','245P','330X','350','410','470G','490D','130P',
            // Kobelco
            'SK210',
            // Komatsu
            'PC78','PC138','PC200','PC290',
            // Liebherr
            'R 920 K','R920','R 936','R936',
            // Link-Belt
            '145 X4','145X4','160 X4','160X4','170X4','190','245X4','300 X4','300X4','350 X4','350X4','355 X4','355X4','490 X4','490X4',
            // Takeuchi
            'TB210','TW65',
            // Volvo
            'EC160','EC330','EC360','EC550','235',
            // Wacker Neuson
            'EZ36'
        ];

        function computeDefaultBom(d) {
            var bom = {};
            var poids = 0;
            var poidsStr = d.poids || '';
            var match = poidsStr.match(/(\d[\d\s]*)/);
            if (match) poids = parseInt(match[1].replace(/\s/g, ''));

            var hasSwing = (d.swing || '').toLowerCase() === 'oui';
            var hasBoom2 = (d.boom || '').toLowerCase().indexOf('2 partie') >= 0;
            var isMini = poids > 0 && poids < 5000;
            var isStandard = poids >= 5000;

            // Cabine obligatoire pour toutes les machines
            bom['0000'] = 'r';

            // R4: Hauteur et Rotation toujours optionnel
            bom['0001'] = 'j';
            bom['0002'] = 'j';

            // R5: Mini < 5T = rouge, sinon N/A
            bom['0004'] = isMini ? 'r' : 'na';

            // R4: Multi Axes — jaune pour TOUTES les excavatrices
            bom['0005'] = 'j';

            // R1/R8: Swing boom = jaune si oui, N/A si non
            bom['0008'] = hasSwing ? 'j' : 'na';

            // R7: Drain — rouge si modele dans la liste, N/A sinon (pas une option)
            var modUpper = d.modele.toUpperCase();
            var isDrain = DRAIN_PREFIXES.some(function(prefix) {
                return modUpper.indexOf(prefix.toUpperCase()) === 0;
            });
            bom['0009'] = isDrain ? 'r' : 'na';

            // Boite GC — jaune seulement pour Caterpillar, na sinon
            var fabUpper = d.fab.toUpperCase();
            // Boite GC — na par defaut, admin remettra manuellement
            bom['0070'] = 'na';

            // Rotation cremaillere — TB216 seulement
            bom['0304'] = (modUpper === 'TB216') ? 'r' : 'na';

            // Harnais de coupure — selon fabricant (fabUpper deja defini)
            if (fabUpper === 'HITACHI') {
                var is7 = d.modele.indexOf('-7') >= 0;
                var is5or6 = d.modele.indexOf('-5') >= 0 || d.modele.indexOf('-6') >= 0;
                d.harnais = (is7 && !is5or6) ? 'H0121' : 'H0031';
            } else if (fabUpper === 'JOHN DEERE') {
                d.harnais = 'H0031';
            } else if (fabUpper === 'KOMATSU') {
                d.harnais = 'H0032';
            } else if (fabUpper.indexOf('DOOSAN') >= 0 || fabUpper.indexOf('DEVELON') >= 0) {
                d.harnais = 'H0033';
            } else if (fabUpper.indexOf('VOLVO') >= 0) {
                d.harnais = 'H0034';
            } else if (fabUpper.indexOf('LINK') >= 0 || fabUpper === 'CASE') {
                d.harnais = 'H0041';
            } else if (fabUpper.indexOf('CATERPILLAR') >= 0 || fabUpper === 'CAT') {
                d.harnais = 'H0080';
            } else {
                d.harnais = 'H0043';
            }

            return bom;
        }

        function computeDefaultBomPompe(d) {
            var bom = {};
            var typePompe = d._spec_Type || '';
            var nbSections = d._spec_Nombre_de_sections || d['_spec_Nombre de sections'] || '';
            var isStationnaire = typePompe.toLowerCase().indexOf('stationnaire') >= 0;
            var isRemorquee = typePompe.toLowerCase().indexOf('remorqu') >= 0;

            // Tout N/A par defaut sauf Hauteur et Rotation (jaune)
            // Admin peut modifier manuellement les autres
            bom['0200'] = 'na';
            bom['0203'] = 'na';
            bom['0201'] = 'j'; // Hauteur
            bom['0202'] = 'j'; // Rotation
            // Sections: rouge si machine a ce nb ou plus (5 sec = 4+5, 6 sec = 4+5+6)
            var sec = parseInt(nbSections) || 0;
            bom['0204'] = (sec >= 4) ? 'r' : 'na';
            bom['0205'] = (sec >= 5) ? 'r' : 'na';
            bom['0206'] = (sec >= 6) ? 'r' : 'na';
            bom['0207'] = 'na';
            bom['0208'] = 'na';
            bom['0209'] = 'na';

            return bom;
        }

        function nextBomState(current) {
            if (current === 'na' || !current) return 'j';
            if (current === 'j') return 'r';
            return 'na';
        }

        function bomTokenHtml(state, code, idx, editable) {
            var cls = 'bom-token';
            if (state === 'r') cls += ' bom-r';
            else if (state === 'j') cls += ' bom-j';
            else cls += ' bom-na';
            if (!editable) cls += ' readonly';
            var label = state === 'r' ? 'R' : state === 'j' ? 'J' : '-';
            return '<span class="' + cls + '" data-code="' + code + '" data-idx="' + idx + '" title="' + BOM_NAMES[code] + '">' + label + '</span>';
        }

        // Load data
        var fullData = null;
        fetch('data/machines.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                fullData = data;
                // Populate type dropdown dynamically from JSON keys
                var typeSelect = document.getElementById('db-type');
                typeSelect.innerHTML = '';
                Object.keys(fullData).sort().forEach(function(t) {
                    var opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    typeSelect.appendChild(opt);
                });
                loadType();
            });

        function loadType() {
            var typeVal = document.getElementById('db-type').value;
            // Switch BOM codes based on type — only Excavatrice and Pompe a Beton have BOM
            if (typeVal === 'Pompe a Beton') {
                BOM_CODES = POMPE_BOM_CODES;
            } else if (typeVal === 'Excavatrice') {
                BOM_CODES = EXC_BOM_CODES;
            } else {
                BOM_CODES = []; // No BOM for other types
            }
            // Set spec columns for this type
            currentSpecCols = SPEC_COLS[typeVal] || SPEC_COLS['Excavatrice'];

            // Rebuild all dynamic headers (remove old BOM + spec + DEL columns, keep fab+modele)
            var headerRow = document.querySelector('#db-table thead tr');
            // Remove everything except fab and modele headers
            while (headerRow.children.length > 2) {
                headerRow.removeChild(headerRow.lastChild);
            }
            // Add BOM columns
            BOM_CODES.forEach(function(code) {
                var th = document.createElement('th');
                th.className = 'bom-col';
                th.textContent = BOM_NAMES[code] || code;
                headerRow.appendChild(th);
            });
            // Add harnais for excavatrice
            if (typeVal === 'Excavatrice') {
                var thH = document.createElement('th');
                thH.className = 'bom-col';
                thH.dataset.col = 'harnais';
                thH.textContent = 'Harnais';
                headerRow.appendChild(thH);
            }
            // Add spec columns
            currentSpecCols.forEach(function(col) {
                var th = document.createElement('th');
                th.dataset.col = col.key;
                th.innerHTML = col.label + ' <span class="sort-arrow">&#9650;</span>';
                th.style.cursor = 'pointer';
                th.addEventListener('click', function() {
                    if (sortCol === col.key) { sortAsc = !sortAsc; }
                    else { sortCol = col.key; sortAsc = true; }
                    applyFilters();
                });
                headerRow.appendChild(th);
            });
            // Add Notes (API) column
            var thNotes = document.createElement('th');
            thNotes.textContent = 'Notes';
            thNotes.style.minWidth = '130px';
            headerRow.appendChild(thNotes);

            // Add Codes produit column
            var thPC = document.createElement('th');
            thPC.textContent = 'Codes produit';
            thPC.style.minWidth = '130px';
            headerRow.appendChild(thPC);

            // Add DEL column
            var thDel = document.createElement('th');
            thDel.style.cssText = 'width:30px;min-width:30px;text-align:center;font-size:0.6rem;';
            thDel.textContent = 'DEL';
            headerRow.appendChild(thDel);

            // Spec field mapping per type
            var SPEC_MAP = {
                'Excavatrice': function(s) {
                    return {
                        puissance: s['Puissance moteur (kW / HP)'] || '',
                        traction: s['Type de traction'] || '',
                        boom: s['Type de boom'] || '',
                        swing: s['Swing boom'] || '',
                        voltage: s['Voltage machine (V/type)'] || '',
                        poids: s['Poids operationnel (kg / lbs)'] || '',
                        classe: s['Classe machine'] || ''
                    };
                },
                'Pompe a Beton': function(s) {
                    return {
                        type_pompe: s['Type'] || '',
                        nb_sections: s['Nombre de sections'] || '',
                        pliage: s['Type de pliage'] || '',
                        voltage: s['Voltage machine (V/type)'] || '',
                        rotation: s['Type de rotation'] || '',
                        console: s['Console operateur'] || '',
                        estop: s['E-stop'] || '',
                        notes: s['Notes'] || ''
                    };
                }
            };
            var mapFn = SPEC_MAP[typeVal] || function(s) { return {}; };

            var section = fullData[typeVal] || {};
            allData = [];
            var fabs = new Set();
            var years = new Set();

            for (var fab in section) {
                fabs.add(fab);
                for (var annee in section[fab]) {
                    years.add(annee);
                    for (var modele in section[fab][annee]) {
                        var s = section[fab][annee][modele];
                        var entry = { fab: fab, modele: modele, annee: annee, harnais: '', bom: {}, _type: typeVal };
                        for (var key in s) { entry['_spec_' + key] = s[key]; }
                        var mapped = mapFn(s);
                        for (var mk in mapped) { entry[mk] = mapped[mk]; }
                        allData.push(entry);
                    }
                }
            }

            // Update fab filter
            var fabSelect = document.getElementById('db-fab');
            fabSelect.innerHTML = '<option value="">Tous</option>';
            Array.from(fabs).sort().forEach(function(f) {
                var opt = document.createElement('option');
                opt.value = f; opt.textContent = f;
                fabSelect.appendChild(opt);
            });
            // Update year filter
            var yearSelect = document.getElementById('db-annee');
            yearSelect.innerHTML = '<option value="">Toutes</option>';
            Array.from(years).sort().forEach(function(y) {
                var opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                yearSelect.appendChild(opt);
            });
            overridesCache = {};
            applyFilters();
        }

        // Type changed
        document.getElementById('db-type').addEventListener('change', loadType);

        function applyFilters() {
            var fab = document.getElementById('db-fab').value;
            var annee = document.getElementById('db-annee').value;
            var search = document.getElementById('db-search').value.toLowerCase().trim();

            filtered = allData.filter(function(d) {
                if (fab && d.fab !== fab) return false;
                // Skip year filter when search is active — show all years for matching models
                if (annee && !search && d.annee !== annee) return false;
                if (search && d.modele.toLowerCase().indexOf(search) === -1 && d.fab.toLowerCase().indexOf(search) === -1) return false;
                return true;
            });

            var classeOrder = {'Mini':0,'Compact':1,'120':2,'200':3,'270':4,'300':5,'400':6,'500':7,'700-800':8,'1000+':9};
            filtered.sort(function(a, b) {
                var va = a[sortCol] || '';
                var vb = b[sortCol] || '';
                if (sortCol === 'annee') { va = parseInt(va) || 0; vb = parseInt(vb) || 0; }
                else if (sortCol === 'classe') {
                    va = classeOrder[va] !== undefined ? classeOrder[va] : 99;
                    vb = classeOrder[vb] !== undefined ? classeOrder[vb] : 99;
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                // Secondary sort: fab then modele
                if (a.fab < b.fab) return -1;
                if (a.fab > b.fab) return 1;
                return a.modele.localeCompare(b.modele);
            });

            currentPage = 0;
            renderPage();
        }

        function renderPage() {
            var tbody = document.getElementById('db-tbody');
            tbody.innerHTML = '';
            var start = currentPage * PAGE_SIZE;
            var end = Math.min(start + PAGE_SIZE, filtered.length);

            // Hide fab column when a fabricant is selected in filter
            var fabFilter = document.getElementById('db-fab').value;
            var fabHeader = document.querySelector('#db-table thead th[data-col="fab"]');
            var dbTable = document.getElementById('db-table');
            if (fabHeader) fabHeader.style.display = fabFilter ? 'none' : '';
            if (fabFilter) dbTable.classList.add('fab-hidden');
            else dbTable.classList.remove('fab-hidden');

            for (var i = start; i < end; i++) {
                var d = filtered[i];
                var tr = document.createElement('tr');
                // Fab + Modele first
                var dataIdx = allData.indexOf(d);
                var searchActive = document.getElementById('db-search').value.trim() !== '';
                ['fab', 'modele'].forEach(function(f) {
                    var td = document.createElement('td');
                    if (f === 'modele' && searchActive) {
                        td.textContent = d.modele + ' (' + d.annee + ')';
                    } else {
                        td.textContent = d[f] || '';
                    }
                    if (f === 'fab' && fabFilter) td.style.display = 'none';
                    tr.appendChild(td);
                });

                // BOM columns — compute defaults per type
                if (!d.bom || Object.keys(d.bom).length === 0) {
                    if (d._type === 'Excavatrice') {
                        d.bom = computeDefaultBom(d);
                    } else if (d._type === 'Pompe a Beton') {
                        d.bom = computeDefaultBomPompe(d);
                    }
                }
                BOM_CODES.forEach(function(code) {
                    var td = document.createElement('td');
                    td.style.textAlign = 'center';
                    td.style.padding = '4px';
                    var state = (d.bom && d.bom[code]) || 'na';
                    td.innerHTML = bomTokenHtml(state, code, dataIdx, canEdit);
                    tr.appendChild(td);
                });

                // Harnais column — seulement pour Excavatrice
                if (d._type === 'Excavatrice') {
                var tdHarnais = document.createElement('td');
                tdHarnais.style.textAlign = 'center';
                tdHarnais.style.padding = '2px';
                var harnaisCode = d.harnais || '';
                var HARNAIS_OPTIONS = [
                    {v: '', l: '-'},
                    {v: 'H0031', l: '0031 Hit5/6-JD'},
                    {v: 'H0032', l: '0032 Komatsu'},
                    {v: 'H0033', l: '0033 Doosan'},
                    {v: 'H0034', l: '0034 Volvo'},
                    {v: 'H0041', l: '0041 LB-Case'},
                    {v: 'H0080', l: '0080 Cat'},
                    {v: 'H0100', l: '0100 Cat (ECU)'},
                    {v: 'H0121', l: '0121 Hit-7'},
                    {v: 'H0043', l: '0043 Generic'}
                ];
                if (canEdit) {
                    var sel = document.createElement('select');
                    sel.className = 'db-harnais-select';
                    sel.dataset.idx = dataIdx;
                    HARNAIS_OPTIONS.forEach(function(o) {
                        var opt = document.createElement('option');
                        opt.value = o.v;
                        opt.textContent = o.l;
                        if (o.v === harnaisCode) opt.selected = true;
                        sel.appendChild(opt);
                    });
                    tdHarnais.appendChild(sel);
                } else {
                    var HARNAIS_LABELS = {'H0031':'Hit5/6-JD','H0032':'Komatsu','H0033':'Doosan','H0034':'Volvo','H0041':'LB-Case','H0080':'Cat','H0100':'Cat(ECU)','H0121':'Hit-7','H0043':'Generic'};
                    tdHarnais.style.fontSize = '0.65rem';
                    tdHarnais.style.fontWeight = '700';
                    tdHarnais.style.color = harnaisCode ? '#00CC66' : '#555';
                    tdHarnais.textContent = HARNAIS_LABELS[harnaisCode] || '-';
                }
                tr.appendChild(tdHarnais);
                } // end if Excavatrice harnais

                // Spec fields after BOM+Harnais — dynamic per type
                currentSpecCols.forEach(function(col) {
                    var f = col.key;
                    var td = document.createElement('td');
                    var val = d[f] || '';
                    if (val === 'A completer') { td.className = 'incomplete'; td.textContent = 'A completer'; }
                    else { td.textContent = val; }
                    tr.appendChild(td);
                });

                // Notes column (API-synced with Portail Machine)
                var tdNotes = document.createElement('td');
                tdNotes.style.padding = '2px';
                var noteInput = document.createElement('input');
                noteInput.type = 'text';
                noteInput.className = 'db-note-input';
                noteInput.placeholder = '...';
                noteInput.dataset.fab = d.fab;
                noteInput.dataset.modele = d.modele;
                noteInput.dataset.annee = d.annee;
                noteInput.dataset.noteKey = 'notes_' + d.fab + '_' + d.modele + '_' + d.annee;
                tdNotes.appendChild(noteInput);
                tr.appendChild(tdNotes);

                // Product codes column
                var tdPC = document.createElement('td');
                tdPC.className = 'db-pc-cell';
                tdPC.style.padding = '2px 4px';
                var pcTagsDiv = document.createElement('div');
                pcTagsDiv.className = 'db-pc-tags';
                pcTagsDiv.innerHTML = '<span class="db-pc-empty">...</span>';
                pcTagsDiv.dataset.fab = d.fab;
                pcTagsDiv.dataset.modele = d.modele;
                pcTagsDiv.dataset.annee = d.annee;
                tdPC.appendChild(pcTagsDiv);
                tr.appendChild(tdPC);

                // Delete button (admin only)
                var tdDel = document.createElement('td');
                tdDel.style.textAlign = 'center';
                tdDel.style.padding = '4px';
                if (canEdit) {
                    var btn = document.createElement('button');
                    btn.className = 'db-delete-btn';
                    btn.dataset.idx = dataIdx;
                    btn.textContent = '\u2715';
                    btn.title = 'Supprimer ' + d.fab + ' ' + d.modele + ' (' + d.annee + ')';
                    tdDel.appendChild(btn);
                }
                tr.appendChild(tdDel);

                tbody.appendChild(tr);
            }

            // Load overrides for visible rows
            for (var i = start; i < end; i++) {
                (function(idx) {
                    var d = filtered[idx];
                    loadOverride(d.fab, d.modele, d.annee, function(overrides) {
                        if (!overrides) return;
                        var globalIdx = allData.indexOf(d);
                        // Merge overrides on top of defaults
                        if (!d.bom || Object.keys(d.bom).length === 0) {
                            if (d._type === 'Pompe a Beton') d.bom = computeDefaultBomPompe(d);
                            else d.bom = computeDefaultBom(d);
                        }
                        for (var code in overrides) {
                            d.bom[code] = overrides[code];
                        }
                        // Update visible tokens
                        var tokens = tbody.querySelectorAll('[data-idx="' + globalIdx + '"]');
                        tokens.forEach(function(token) {
                            var c = token.dataset.code;
                            if (!c) return; // skip non-bom elements like harnais select
                            var st = d.bom[c] || 'na';
                            token.className = 'bom-token' + (st === 'r' ? ' bom-r' : st === 'j' ? ' bom-j' : ' bom-na') + (canEdit ? '' : ' readonly');
                            token.textContent = st === 'r' ? 'R' : st === 'j' ? 'J' : '-';
                        });
                        // Update harnais dropdown if override has it
                        if (overrides.harnais) {
                            d.harnais = overrides.harnais;
                            var hSel = tbody.querySelector('.db-harnais-select[data-idx="' + globalIdx + '"]');
                            if (hSel) hSel.value = overrides.harnais;
                        }
                    });
                })(i);
            }

            // Stats
            var incomplete = filtered.filter(function(d) {
                return d.puissance === 'A completer' || d.poids === 'A completer' || !d.puissance || !d.poids;
            }).length;
            document.getElementById('db-stats').innerHTML =
                '<strong>' + filtered.length + '</strong> resultats' +
                (incomplete > 0 ? ' | <span style="color:#FF8C00;">' + incomplete + ' incomplets</span>' : '') +
                ' | Page ' + (currentPage + 1) + ' / ' + Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));

            document.getElementById('db-prev').disabled = currentPage === 0;
            document.getElementById('db-next').disabled = end >= filtered.length;
            document.getElementById('db-page-info').textContent = (start + 1) + ' - ' + end + ' sur ' + filtered.length;

            // Lazy-load notes for visible rows
            var noteInputs = tbody.querySelectorAll('.db-note-input');
            noteInputs.forEach(function(input) {
                var noteKey = input.dataset.noteKey;
                fetch(API_URL + '?action=get&key=' + encodeURIComponent(noteKey))
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.value) input.value = data.value;
                    })
                    .catch(function() {
                        var local = localStorage.getItem(noteKey);
                        if (local) input.value = local;
                    });
            });

            // Lazy-load product codes for visible rows
            var pcCells = tbody.querySelectorAll('.db-pc-cell');
            pcCells.forEach(function(cell) {
                var tags = cell.querySelector('.db-pc-tags');
                var fab = tags.dataset.fab;
                var modele = tags.dataset.modele;
                var annee = tags.dataset.annee;
                loadProductCodes(fab, modele, annee, function(codes) {
                    renderCellTags(cell, codes);
                });
            });
        }

        // Change harnais dropdown
        document.getElementById('db-tbody').addEventListener('change', function(e) {
            var sel = e.target.closest('.db-harnais-select');
            if (!sel || !canEdit) return;
            var idx = parseInt(sel.dataset.idx);
            var d = allData[idx];
            if (!d) return;
            d.harnais = sel.value;
            // Save harnais in the BOM override
            if (!d.bom) d.bom = {};
            d.bom['harnais'] = sel.value;
            saveOverride(d.fab, d.modele, d.annee, d.bom);
        });

        // Save notes on blur (onchange/onblur)
        document.getElementById('db-tbody').addEventListener('focusout', function(e) {
            var input = e.target.closest('.db-note-input');
            if (!input) return;
            var noteKey = input.dataset.noteKey;
            var val = input.value.trim();
            // Save locally first
            localStorage.setItem(noteKey, val);
            // Save to API
            fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'text/plain'},
                body: JSON.stringify({ key: noteKey, value: val, pin: '1400' })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    input.classList.add('note-saved');
                    setTimeout(function() { input.classList.remove('note-saved'); }, 1500);
                }
            })
            .catch(function() {});
        });

        // Click on product codes cell to open popup
        document.getElementById('db-tbody').addEventListener('click', function(e) {
            var tags = e.target.closest('.db-pc-tags');
            if (!tags || !canEdit) return;
            var fab = tags.dataset.fab;
            var modele = tags.dataset.modele;
            var annee = tags.dataset.annee;
            var cell = tags.closest('.db-pc-cell');
            openProductCodesPopup(fab, modele, annee, cell);
        });

        // Click on Delete button
        document.getElementById('db-tbody').addEventListener('click', function(e) {
            var btn = e.target.closest('.db-delete-btn');
            if (!btn || !canEdit) return;
            var idx = parseInt(btn.dataset.idx);
            var d = allData[idx];
            if (!d) return;
            if (!confirm('Supprimer ' + d.fab + ' ' + d.modele + ' (' + d.annee + ') ?\n\nCette action est irreversible.')) return;

            // Mark as deleted in API
            var delKey = 'deleted_' + d.fab.replace(/[^a-zA-Z0-9]/g,'_') + '_' + d.modele.replace(/[^a-zA-Z0-9]/g,'_') + '_' + d.annee;
            fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'text/plain'},
                body: JSON.stringify({ action: 'save', key: delKey, value: 'deleted', pin: '1400' })
            }).catch(function() {});

            // Remove from local data
            allData.splice(idx, 1);
            applyFilters();
            showToast(d.fab + ' ' + d.modele + ' (' + d.annee + ') supprime');
        });

        // Click on BOM token
        document.getElementById('db-tbody').addEventListener('click', function(e) {
            var token = e.target.closest('.bom-token');
            if (!token || !canEdit || token.classList.contains('readonly')) return;

            var idx = parseInt(token.dataset.idx);
            var code = token.dataset.code;
            var d = allData[idx];
            if (!d) return;

            if (!d.bom) d.bom = {};
            var current = d.bom[code] || 'na';
            var next = nextBomState(current);
            d.bom[code] = next;

            // Update token visually
            token.className = 'bom-token' + (next === 'r' ? ' bom-r' : next === 'j' ? ' bom-j' : ' bom-na');
            token.textContent = next === 'r' ? 'R' : next === 'j' ? 'J' : '-';

            // Save to API
            saveOverride(d.fab, d.modele, d.annee, d.bom);
        });

        // Events
        document.getElementById('db-fab').addEventListener('change', applyFilters);
        document.getElementById('db-annee').addEventListener('change', applyFilters);
        document.getElementById('db-search').addEventListener('input', applyFilters);
        document.getElementById('db-prev').addEventListener('click', function() { currentPage--; renderPage(); });
        document.getElementById('db-next').addEventListener('click', function() { currentPage++; renderPage(); });

        // Sort (only on spec columns, not BOM)
        document.querySelectorAll('.db-table thead th[data-col]').forEach(function(th) {
            th.addEventListener('click', function() {
                var col = this.dataset.col;
                if (sortCol === col) { sortAsc = !sortAsc; }
                else { sortCol = col; sortAsc = true; }
                document.querySelectorAll('.db-table thead th').forEach(function(t) { t.classList.remove('sorted'); });
                this.classList.add('sorted');
                var arrow = this.querySelector('.sort-arrow');
                if (arrow) arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
                applyFilters();
            });
        });

        // Sync top scrollbar with table
        var scrollTop = document.getElementById('db-scroll-top');
        var tableWrap = document.getElementById('db-table-wrap');
        var scrollInner = document.getElementById('db-scroll-top-inner');
        function syncScrollWidth() {
            var tbl = document.getElementById('db-table');
            if (tbl) scrollInner.style.width = tbl.scrollWidth + 'px';
        }
        scrollTop.addEventListener('scroll', function() { tableWrap.scrollLeft = scrollTop.scrollLeft; });
        tableWrap.addEventListener('scroll', function() { scrollTop.scrollLeft = tableWrap.scrollLeft; });
        var origRender = renderPage;
        var _renderWrap = renderPage;
        // After each render, sync scroll width
        var _origRenderPage = renderPage;
        renderPage = function() { _origRenderPage(); setTimeout(syncScrollWidth, 50); };

        // Export CSV
        document.getElementById('db-export').addEventListener('click', function() {
            var csv = 'Fabricant,Modele,Annee,Puissance,Traction,Type boom,Swing,Voltage,Poids,Classe,Cabine,Hauteur,Rotation,Mini,Multi,Swing BOM,Drain,GC,Harnais\n';
            filtered.forEach(function(d) {
                var row = [d.fab, d.modele, d.annee, d.puissance, d.traction, d.boom, d.swing, d.voltage, d.poids, d.classe];
                BOM_CODES.forEach(function(c) { row.push((d.bom && d.bom[c]) || '-'); });
                row.push(d.harnais || '-');
                csv += row.map(function(v) { return '"' + (v || '').replace(/"/g, '""') + '"'; }).join(',') + '\n';
            });
            var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'excavatrice_bd_' + new Date().toISOString().slice(0, 10) + '.csv';
            link.click();
        });
    })();
    </script>
</body>
</html>
